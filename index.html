<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Martinovo web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .burger {
            font-size: 30px;
            cursor: pointer;
            user-select: none;
        }
        nav {
            position: fixed;
            top: 0;
            right: -200px;
            width: 200px;
            height: 100%;
            background-color: #333;
            color: white;
            padding-top: 60px;
            transition: right 0.3s;
        }
        nav a {
            display: block;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #575757;
        }
        nav.open {
            right: 0;
        }
        main {
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Martinovo web</h1>
    <div class="burger" id="burger">&#9776;</div>
</header>

<nav id="menu">
    <a href="#">Domů</a>
    <a href="#">O mně</a>
    <a href="#">Fotky</a>
    <a href="#">Kontakt</a>
</nav>

<main>
    <img src="DOPLNIM FOTKU" alt="Moje fotka">
    <p>Ahoj! Jsem student IT v Nera a toto je moje první jednoduchá webová stránka. Rád dlouho spim a nemam rad programování <3 .</p>
</main>

<script>
    const burger = document.getElementById('burger');
    const menu = document.getElementById('menu');

    burger.addEventListener('click', () => {
        menu.classList.toggle('open');
    });
</script>

</body>
</html>
